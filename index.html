<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte Técnico</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        .contenedor{
            width: 100%;
            max-width: 900px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1{
            font-size: 2.3rem;
            margin-bottom: 20px;
            color: #00d4ff;
            text-shadow: 0 0 10px #000;
        }

        p{
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        button{
            margin: 15px 0 25px 0;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            background: #00d4ff;
            color: black;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover{
            background: white;
        }

        .galeria{
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .galeria img{
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 15px rgba(0,212,255,0.5);
            cursor: pointer;
            transition: transform 0.3s;
        }

        .galeria img:hover{
            transform: scale(1.05);
        }

        footer{
            margin-top: 30px;
            font-size: 0.9rem;
            color: #dcdcdc;
        }

        /* GATO VOLADOR */
        .gato-volador{
            position: fixed;
            top: 80px;
            left: -250px;
            animation: volar 10s linear infinite;
            z-index: 999;
        }

        .gato-volador img{
            width: 150px;
            cursor: pointer;
        }

        @keyframes volar{
            0%{ left: -250px; transform: translateY(0); }
            50%{ transform: translateY(30px); }
            100%{ left: 110%; transform: translateY(0); }
        }

        /* EXPLOSION */
        .explosion{
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none;
        }

        .explosion img{
            width: 200px;
        }

        @media (max-width: 600px){

            h1{
                font-size: 1.6rem;
            }

            p{
                font-size: 1rem;
            }

            .contenedor{
                padding: 20px;
            }

            .galeria img{
                max-width: 100%;
            }
        }

    </style>
</head>

<body>

    <!-- AUDIO PRINCIPAL -->
    <audio id="musica">
        <source src="sonido.mp3" type="audio/mpeg">
    </audio>

    <!-- AUDIO CLICK IMAGEN -->
    <audio id="sonidoImagen">
        <source src="sonido2.mp3" type="audio/mpeg">
    </audio>

    <!-- GATO -->
    <div class="gato-volador" id="gato" onclick="explotarGato()">
        <img src="gato.gif" alt="Gato volador">
    </div>

    <!-- EXPLOSION -->
    <div class="explosion" id="explosion">
        <img src="explosion.gif" alt="Explosión">
    </div>

    <div class="contenedor">

        <h1>💻 SOPORTE TÉCNICO: GRUPO # 3</h1>

        <p>
            <strong>Integrantes:</strong><br><br>

            Xiulin Reyes<br>
            Ian Smith<br>
            Lian Villalta<br>
            Sebastian Rocha
        </p>

        <button onclick="reproducirAudio()">🔊 Reproducir Música</button>

        <div class="galeria">

            <img src="grupo.jpg" alt="Foto del grupo" onclick="sonarImagen()">

            <img src="equipo.jpg" alt="Imagen adicional">

        </div>

        <footer>
            Página creada en IIS | Grupo #3
        </footer>

    </div>

    <script>

        function reproducirAudio(){
            document.getElementById("musica").play();
        }

        function sonarImagen(){
            const sonido = document.getElementById("sonidoImagen");
            sonido.currentTime = 0;
            sonido.play();
        }

        function explotarGato(){

            const gato = document.getElementById("gato");
            const explosion = document.getElementById("explosion");

            gato.style.display = "none";
            explosion.style.display = "block";

            setTimeout(() => {
                explosion.style.display = "none";
                gato.style.display = "block";
            }, 1000);
        }

        window.onload = function(){
            document.getElementById("musica").play().catch(()=>{});
        };

    </script>

</body>

</html>
